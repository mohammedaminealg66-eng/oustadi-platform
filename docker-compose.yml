version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: oustadi_db
    restart: always
    environment:
      POSTGRES_USER: oustadi_user
      POSTGRES_PASSWORD: oustadi_password_123
      POSTGRES_DB: oustadi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: oustadi_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@oustadi.ma
      PGADMIN_DEFAULT_PASSWORD: admin_password_123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: